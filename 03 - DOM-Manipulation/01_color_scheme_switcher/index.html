<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Scheme Switcher</title>
    <style>
        .button {
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        
        .yellow-btn{
            border: none;
            padding: 15px;
            color: #000000;
            background-color: #ffff00;
            margin: 10px;
            border-radius: 20px;
            
        }
        
        .blue-btn{
            border: none;
            padding: 15px;
            color: #ffffff;
            background-color: #0000ff;
            margin: 10px;
            border-radius: 20px;
            
        }
        
        .black-btn{
            border: none;
            padding: 15px;
            color: #ffffff;
            background-color: #000000;
            margin: 10px;
            border-radius: 20px;
            
        }
        
        .gray-btn{
            border: none;
            padding: 15px;
            color:hsl(240, 20%, 98%) ;
            background-color: gray;
            margin: 10px;
            border-radius: 20px;  
        }
        h1{
            text-align: center;
                }   
        h2{
              text-align: center;
        }     
        </style>
</head>

<body>
    <h1>Color Scheme Switcher</h1>
    <div class="button">
        <button class="yellow-btn" id="yellow">Change Color</button>
        
        <button class="blue-btn" id="blue">Change Color</button>
        
        <button class="black-btn" id="black">Change Color</button>
        
        <button class="gray-btn" id="gray">Change Color</button>

    </div>
    <h2>
        Try clicking on one of the colors above
        to change the background color of this page!
      </h2>

    <script src="ColorSchemeSwitcher.js"></script>
</body>

</html>
