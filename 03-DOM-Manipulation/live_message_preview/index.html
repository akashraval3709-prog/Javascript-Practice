<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Counter</title>
    <style>
        *{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body{
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    background-color: #000;
    font-family: Arial, sans-serif;
}

.container{
    width: 100%;
    max-width: 550px;
    padding: 20px;
}

.myform{
    background-color: #334155;
    padding: 30px;
    border-radius: 12px;
    box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3);
}

.input{
    display: flex;
    flex-direction: column;
    gap: 10px;
}

.input label{
    color: #fff;
    font-size: 0.95rem;
}

.input input{
    width: 100%;
    padding: 12px;
    border-radius: 6px;
    border: 1px solid #475569;
    background-color: #0f172a;
    color: #fff;
    outline: none;
    transition: 0.3s;
}

.input input:focus{
    border-color: #38bdf8;
}

.msg{
    margin-top: 20px;
    color: #fff;
    font-size: 1.5rem;
    font-weight: 700;
    text-align: center;
    word-break: break-word;
}
    </style>
</head>

<body>
    <div class="container">
        <div class="number">
            <p class="msg"></p>
        </div>

        <form class="myform">
            <div class="input">
                <label for="msg"> Message </label>
                <input type="text" class="usermsg" id="msg">

            </div>

        </form>
    </div>
    <script src="script.js"></script>
</body>

</html>
