<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Theme Toggle</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family: Arial, sans-serif;
            transition: all 0.3s ease;
        }

        .container{
            height:100vh;
            display:flex;
            flex-direction:column;
            justify-content:center;
            align-items:center;
            gap:20px;
        }

        h1{
            font-size:3rem;
        }

        p{
            font-size:1.1rem;
        }

        button{
            padding:12px 24px;
            font-size:1rem;
            cursor:pointer;
            border:none;
            border-radius:8px;
        }

        .dark{
            background-color:black;
            color:white;
        }

        .white{
            background-color:white;
            color:black;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🌙 Theme Toggle</h1>

        <p>
            Click the button to switch between Light and Dark Mode.
        </p>

        <button id="btn">
            Toggle Theme
        </button>
    </div>

    <script src="script.js"></script>
</body>
</html>
